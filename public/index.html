<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holdings Viewer</title>
  <style>
    :root {
      color-scheme: light;

      --bg:        oklch(95%   0.006 265);
      --surface:   oklch(99%   0.003 265);
      --surface-2: oklch(93%   0.008 265);
      --border:    oklch(87%   0.010 265);

      --text:      oklch(22%   0.012 265);
      --text-head: oklch(14%   0.010 265);
      --text-2:    oklch(42%   0.012 260);
      --text-3:    oklch(56%   0.012 255);
      --text-4:    oklch(68%   0.010 255);

      --accent:    oklch(50%   0.210 270);
      --accent-2:  oklch(45%   0.230 270);
      --accent-3:  oklch(50%   0.240 270);

      --amber:     oklch(52%   0.160  75);
      --amber-2:   oklch(58%   0.170  76);

      --green:     oklch(40%   0.160 145);
      --green-bg:  oklch(94%   0.040 148);
      --red:       oklch(44%   0.170  24);
      --red-bg:    oklch(95%   0.040  22);

      --text-xs:   0.72rem;
      --text-sm:   0.8rem;
      --text-base: 0.875rem;
      --text-xl:   1.4rem;

      --radius-sm: 4px;
      --radius:    6px;
      --radius-md: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; color: var(--text-head); }
    header .meta { font-size: var(--text-xs); color: var(--text-3); margin-left: auto; }

    .tabs {
      display: flex;
      padding: 0 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-3);
      cursor: pointer;
      font-size: var(--text-base);
      font-weight: 500;
      padding: 0.75rem 1.25rem;
      margin-bottom: -1px;
      transition: color 0.15s;
      outline: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .tab-btn { transition: none; }
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn[aria-selected="true"] { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:focus-visible {
      outline: 2px solid var(--accent-2);
      outline-offset: -2px;
      border-radius: var(--radius-sm);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .stats {
      display: flex;
      gap: 1rem;
      padding: 1.25rem 2rem;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.875rem 1.25rem;
      min-width: 160px;
    }

    .stat-card .label { font-size: var(--text-xs); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: var(--text-xl); font-weight: 700; color: var(--text-head); margin-top: 2px; }

    .controls {
      display: flex;
      gap: 0.75rem;
      padding: 0 2rem 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls-top { padding-top: 1.25rem; }

    input[type="search"],
    select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.45rem 0.75rem;
      font-size: var(--text-base);
      outline: none;
    }

    input[type="search"] { width: 260px; }
    select { cursor: pointer; }

    input[type="search"]:focus-visible,
    select:focus-visible {
      border-color: var(--accent-2);
      outline: 2px solid color-mix(in oklch, var(--accent-2) 30%, transparent);
      outline-offset: 0;
    }

    .table-wrap {
      padding: 0 2rem 2rem;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
    }

    thead th {
      background: var(--surface);
      color: var(--text-2);
      font-weight: 600;
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.65rem 0.875rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--accent); }
    thead th:focus-visible { outline: 2px solid var(--accent-2); outline-offset: -2px; }

    thead th .arrow { margin-left: 4px; opacity: 0.5; }
    thead th.sorted .arrow { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--surface-2);
      transition: background 0.1s;
    }

    @media (prefers-reduced-motion: reduce) {
      tbody tr { transition: none; }
    }

    tbody tr:hover { background: var(--surface-2); }

    td { padding: 0.6rem 0.875rem; white-space: nowrap; }

    td.rank   { color: var(--text-4); font-size: var(--text-xs); width: 48px; }
    td.issuer { max-width: 260px; overflow: hidden; text-overflow: ellipsis; color: var(--text-head); font-weight: 500; }
    td.cusip  { color: var(--text-3); font-family: monospace; font-size: var(--text-sm); }
    td.class  { color: var(--text-2); }
    td.value  { text-align: right; font-variant-numeric: tabular-nums; }
    td.shares { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-2); }
    td.disc   { color: var(--text-3); font-size: var(--text-xs); }

    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
    }

    .badge-call { background: var(--green-bg); color: var(--green); }
    .badge-put  { background: var(--red-bg);   color: var(--red); }

    .pager {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 2rem 1.5rem;
      font-size: var(--text-sm);
      color: var(--text-3);
    }

    .pager button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      font-size: var(--text-sm);
      outline: none;
    }

    .pager button:disabled { opacity: 0.35; cursor: default; }
    .pager button:not(:disabled):hover { border-color: var(--accent-2); }
    .pager button:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; }

    .status-msg { padding: 4rem 2rem; text-align: center; color: var(--text-4); }

    .bar-wrap { display: flex; align-items: center; gap: 6px; }
    .bar { height: 6px; border-radius: 3px; background: var(--accent-3); min-width: 2px; }

    /* ETF panel */
    .etf-hero {
      display: flex;
      gap: 1rem;
      padding: 1.25rem 2rem;
      flex-wrap: wrap;
    }

    .etf-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.875rem 1.25rem;
      min-width: 180px;
    }

    .etf-stat .label { font-size: var(--text-xs); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
    .etf-stat .value { font-size: 1.35rem; font-weight: 700; color: var(--text-head); margin-top: 2px; }
    .etf-stat .sub   { font-size: var(--text-sm); color: var(--text-3); margin-top: 2px; }

    .weight-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .weight-bar { height: 8px; border-radius: 4px; background: var(--amber-2); min-width: 2px; }

    td.weight      { text-align: right; font-variant-numeric: tabular-nums; }
    td.qty         { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-2); }
    td.ticker      { font-family: monospace; font-weight: 700; color: var(--amber); }
    td.asset-class { color: var(--text-2); font-size: 0.82rem; }

    /* Quarterly Changes */
    .qtr-table th,
    .qtr-table td { padding: 0.5rem 0.6rem; white-space: nowrap; font-size: var(--text-sm); }

    .qtr-table thead th           { text-align: center; }
    .qtr-table thead th.col-issuer { text-align: left; }

    .qtr-table td.col-issuer { color: var(--text-head); font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .qtr-table td.col-cusip  { font-family: monospace; color: var(--text-3); font-size: var(--text-xs); }
    .qtr-table td.num        { text-align: right; font-variant-numeric: tabular-nums; }
    .qtr-table td.delta-pos  { text-align: right; font-variant-numeric: tabular-nums; background: color-mix(in oklch, var(--green) 8%, transparent); color: var(--green); }
    .qtr-table td.delta-neg  { text-align: right; font-variant-numeric: tabular-nums; background: color-mix(in oklch, var(--red)   8%, transparent); color: var(--red); }
    .qtr-table td.delta-zero { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-4); }

    .qtr-table th.sep,
    .qtr-table td.sep  { border-left: 1px solid var(--border); }
    .qtr-group-label   { background: var(--surface); color: var(--accent); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.06em; }

  </style>
</head>
<body>

<header>
  <h1 id="header-title">Holdings Viewer</h1>
  <div class="meta" id="header-meta"></div>
</header>

<nav class="tabs" role="tablist" aria-label="Holdings views">
  <button class="tab-btn" role="tab" aria-selected="true"  aria-controls="tab-13f"       id="btn-tab-13f">13F Holdings</button>
  <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-etf"       id="btn-tab-etf">iShares ETF</button>
  <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-quarterly" id="btn-tab-quarterly">Quarterly Changes</button>
</nav>

<!-- 13F Holdings Panel -->
<div id="tab-13f" class="tab-panel active" role="tabpanel" aria-labelledby="btn-tab-13f">
  <div class="stats">
    <div class="stat-card"><div class="label">Period</div><div class="value" id="stat-date">—</div></div>
    <div class="stat-card"><div class="label">Total Positions</div><div class="value" id="stat-positions">—</div></div>
    <div class="stat-card"><div class="label">Total Value</div><div class="value" id="stat-value">—</div></div>
  </div>

  <div class="controls">
    <input type="search" id="search" placeholder="Search issuer or CUSIP…" aria-label="Search issuer or CUSIP" />
    <select id="disc-filter" aria-label="Filter by discretion">
      <option value="">All discretion</option>
      <option value="SOLE">SOLE</option>
      <option value="SHARED">SHARED</option>
      <option value="DFND">DEFINED</option>
    </select>
    <select id="page-size" aria-label="Rows per page">
      <option value="50">50 / page</option>
      <option value="100">100 / page</option>
      <option value="250">250 / page</option>
    </select>
  </div>

  <div class="table-wrap">
    <table id="tbl" aria-label="13F holdings">
      <thead>
        <tr>
          <th data-col="rank" scope="col">#</th>
          <th data-col="issuer" scope="col">Issuer</th>
          <th data-col="cusip" scope="col">CUSIP</th>
          <th data-col="class" scope="col">Class</th>
          <th data-col="value_usd" scope="col" class="sorted" aria-sort="descending">Value ($M) <span class="arrow">▼</span></th>
          <th data-col="shares" scope="col">Shares <span class="arrow"></span></th>
          <th data-col="investDisc" scope="col">Discretion <span class="arrow"></span></th>
          <th data-col="putCall" scope="col">Put/Call <span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pager">
    <button id="btn-prev" aria-label="Previous page">← Prev</button>
    <span id="pager-info"></span>
    <button id="btn-next" aria-label="Next page">Next →</button>
  </div>

  <div id="status" class="status-msg" role="status">Loading holdings…</div>
</div>

<!-- iShares ETF Panel -->
<div id="tab-etf" class="tab-panel" role="tabpanel" aria-labelledby="btn-tab-etf">
  <div class="controls controls-top">
    <select id="etf-select" aria-label="Select ETF">
      <option value="ibit">IBIT — iShares Bitcoin Trust ETF</option>
      <option value="etha">ETHA — iShares Ethereum Trust ETF</option>
      <option value="agg">AGG — iShares Core U.S. Aggregate Bond ETF</option>
    </select>
  </div>

  <div class="etf-hero">
    <div class="etf-stat">
      <div class="label">Fund</div>
      <div class="value" id="etf-name" style="font-size:1rem">—</div>
    </div>
    <div class="etf-stat">
      <div class="label">As of</div>
      <div class="value" id="etf-date">—</div>
      <div class="sub" id="etf-inception"></div>
    </div>
    <div class="etf-stat">
      <div class="label">AUM</div>
      <div class="value" id="etf-aum">—</div>
    </div>
    <div class="etf-stat">
      <div class="label">Shares Outstanding</div>
      <div class="value" id="etf-shares">—</div>
    </div>
    <div class="etf-stat" id="etf-asset-wrap">
      <div class="label">Asset Held</div>
      <div class="value" id="etf-asset">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <table aria-label="ETF holdings">
      <thead id="etf-thead">
        <tr>
          <th scope="col">Ticker</th>
          <th scope="col">Name</th>
          <th scope="col">Asset Class</th>
          <th scope="col" style="text-align:right">Market Value</th>
          <th scope="col" style="text-align:right">Weight %</th>
          <th scope="col" style="text-align:right">Quantity</th>
          <th scope="col">Currency</th>
        </tr>
      </thead>
      <tbody id="etf-tbody"></tbody>
    </table>
  </div>

  <div id="etf-status" class="status-msg" role="status">Loading ETF data…</div>
</div>

<!-- Quarterly Changes Panel -->
<div id="tab-quarterly" class="tab-panel" role="tabpanel" aria-labelledby="btn-tab-quarterly">
  <div class="table-wrap" style="padding-top:1.5rem">
    <table class="qtr-table" id="qtr-tbl" aria-label="Quarterly position changes">
      <thead id="qtr-thead"></thead>
      <tbody id="qtr-tbody"></tbody>
    </table>
  </div>
  <div id="qtr-status" class="status-msg" role="status">Loading quarterly data…</div>
</div>


<script>
  let allData = [];
  let filtered = [];
  let sortCol = "value_usd";
  let sortDir = -1;
  let page = 0;
  let pageSize = 50;
  let maxVal = 1;

  async function load() {
    try {
      const res = await fetch("/data/holdings_0002012383_2025-12-31.json");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();

      document.getElementById("header-title").textContent = `${json.fund} — 13F Holdings`;
      document.getElementById("header-meta").textContent = `Fetched ${new Date(json.fetched).toLocaleString()}`;
      document.getElementById("stat-date").textContent = json.date;
      document.getElementById("stat-positions").textContent = json.total_positions.toLocaleString();

      const totalT = json.total_value_usd / 1e12;
      document.getElementById("stat-value").textContent =
        totalT >= 1 ? `$${totalT.toFixed(2)}T` : `$${(json.total_value_usd / 1e9).toFixed(1)}B`;

      allData = [...json.holdings]
        .sort((a, b) => (b.value_usd || 0) - (a.value_usd || 0))
        .slice(0, 20)
        .map((h, i) => ({ ...h, _origRank: i + 1 }));
      maxVal = Math.max(...allData.map(h => h.value_usd));

      document.getElementById("status").style.display = "none";
      applyFilters();
    } catch (e) {
      document.getElementById("status").textContent = `Error: ${e.message}`;
    }
  }

  function applyFilters() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const disc = document.getElementById("disc-filter").value;

    filtered = allData.filter(h => {
      if (q && !h.issuer.toLowerCase().includes(q) && !h.cusip.toLowerCase().includes(q)) return false;
      if (disc && h.investDisc !== disc) return false;
      return true;
    });

    filtered.sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (typeof av === "string") av = av.toLowerCase(), bv = bv.toLowerCase();
      return av < bv ? sortDir : av > bv ? -sortDir : 0;
    });

    page = 0;
    render();
  }

  function render() {
    pageSize = parseInt(document.getElementById("page-size").value);
    const start = page * pageSize;
    const slice = filtered.slice(start, start + pageSize);
    const tbody = document.getElementById("tbody");

    tbody.innerHTML = slice.map((h, i) => {
      const rank = start + i + 1;
      const valM = (h.value_usd / 1_000_000).toLocaleString("en-US", { maximumFractionDigits: 0 });
      const barPct = Math.round((h.value_usd / maxVal) * 120);
      const shares = h.shares.toLocaleString();
      const putCallBadge = h.putCall === "Call"
        ? `<span class="badge badge-call">CALL</span>`
        : h.putCall === "Put"
        ? `<span class="badge badge-put">PUT</span>`
        : `<span style="color:var(--text-4)">—</span>`;

      return `<tr>
        <td class="rank">${rank}</td>
        <td class="issuer" title="${h.issuer}">${h.issuer}</td>
        <td class="cusip">${h.cusip}</td>
        <td class="class">${h.class}</td>
        <td class="value">
          <div class="bar-wrap">
            <div class="bar" style="width:${barPct}px"></div>
            <span>${valM}</span>
          </div>
        </td>
        <td class="shares">${shares}</td>
        <td class="disc">${h.investDisc}</td>
        <td>${putCallBadge}</td>
      </tr>`;
    }).join("");

    const total = filtered.length;
    const end = Math.min(start + pageSize, total);
    document.getElementById("pager-info").textContent =
      total === 0 ? "No results" : `${start + 1}–${end} of ${total.toLocaleString()}`;
    document.getElementById("btn-prev").disabled = page === 0;
    document.getElementById("btn-next").disabled = end >= total;
  }

  // Sorting
  document.querySelectorAll("thead th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (col === "rank") return;
      if (sortCol === col) {
        sortDir *= -1;
      } else {
        sortCol = col;
        sortDir = col === "issuer" || col === "cusip" || col === "class" || col === "investDisc" || col === "putCall" ? 1 : -1;
      }
      document.querySelectorAll("thead th[data-col]").forEach(t => {
        t.classList.remove("sorted");
        t.removeAttribute("aria-sort");
        const a = t.querySelector(".arrow");
        if (a) a.textContent = "";
      });
      th.classList.add("sorted");
      th.setAttribute("aria-sort", sortDir === -1 ? "descending" : "ascending");
      const arrow = th.querySelector(".arrow") || (() => {
        const s = document.createElement("span");
        s.className = "arrow";
        th.appendChild(s);
        return s;
      })();
      arrow.textContent = sortDir === -1 ? " ▼" : " ▲";
      applyFilters();
    });
  });

  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("disc-filter").addEventListener("change", applyFilters);
  document.getElementById("page-size").addEventListener("change", () => { page = 0; render(); });
  document.getElementById("btn-prev").addEventListener("click", () => { page--; render(); });
  document.getElementById("btn-next").addEventListener("click", () => { page++; render(); });

  load();

  // Tab switching
  document.querySelectorAll(".tab-btn[role='tab']").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn[role='tab']").forEach(b => {
        b.setAttribute("aria-selected", "false");
      });
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.setAttribute("aria-selected", "true");
      document.getElementById(btn.getAttribute("aria-controls")).classList.add("active");
      if (btn.getAttribute("aria-controls") === "tab-quarterly") loadQuarterly();
    });
  });

  // iShares ETF
  async function loadEtf(key) {
    const statusEl = document.getElementById("etf-status");
    statusEl.style.display = "";
    statusEl.textContent = "Loading…";
    try {
      const res = await fetch(`/data/${key}_holdings.json`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();

      document.getElementById("etf-name").textContent = d.fund;
      document.getElementById("etf-date").textContent = d.date;
      document.getElementById("etf-inception").textContent = `Inception: ${d.inception_date}`;

      const aum = d.total_market_value;
      document.getElementById("etf-aum").textContent =
        aum >= 1e9 ? `$${(aum / 1e9).toFixed(2)}B` : `$${(aum / 1e6).toFixed(2)}M`;
      document.getElementById("etf-shares").textContent =
        (d.shares_outstanding / 1e6).toFixed(1) + "M";

      const isBond = d.type === "bond";
      document.getElementById("etf-asset-wrap").style.display = isBond ? "none" : "";

      if (!isBond) {
        const primary = d.holdings.find(h => h.asset_class === "Alternative") || d.holdings[0];
        document.getElementById("etf-asset").textContent = primary
          ? `${primary.quantity.toLocaleString("en-US", { maximumFractionDigits: 3 })} ${primary.currency}`
          : "—";
      }

      document.getElementById("etf-thead").innerHTML = isBond ? `<tr>
        <th scope="col">Name</th>
        <th scope="col">Sector</th>
        <th scope="col">Asset Class</th>
        <th scope="col" style="text-align:right">Market Value</th>
        <th scope="col" style="text-align:right">Weight %</th>
        <th scope="col">CUSIP</th>
        <th scope="col" style="text-align:right">Coupon %</th>
        <th scope="col">Maturity</th>
        <th scope="col" style="text-align:right">Duration</th>
        <th scope="col" style="text-align:right">YTM %</th>
      </tr>` : `<tr>
        <th scope="col">Ticker</th>
        <th scope="col">Name</th>
        <th scope="col">Asset Class</th>
        <th scope="col" style="text-align:right">Market Value</th>
        <th scope="col" style="text-align:right">Weight %</th>
        <th scope="col" style="text-align:right">Quantity</th>
        <th scope="col">Currency</th>
      </tr>`;

      const fmtMv = v => v != null ? "$" + v.toLocaleString("en-US", { maximumFractionDigits: 2 }) : "—";
      const fmtWt = (v, barClass) => {
        const wt  = v != null ? v.toFixed(2) + "%" : "—";
        const barW = v != null ? Math.round(v * 1.2) : 0;
        return `<div class="${barClass}-wrap"><div class="${barClass}" style="width:${barW}px"></div><span>${wt}</span></div>`;
      };

      document.getElementById("etf-tbody").innerHTML = d.holdings.map(h => isBond ? `<tr>
        <td class="issuer">${h.name}</td>
        <td class="asset-class">${h.sector}</td>
        <td class="asset-class">${h.asset_class}</td>
        <td class="value">${fmtMv(h.market_value)}</td>
        <td class="weight">${fmtWt(h.weight_pct, "weight-bar")}</td>
        <td class="cusip">${h.cusip || "—"}</td>
        <td class="qty">${h.coupon_pct != null ? h.coupon_pct.toFixed(2) + "%" : "—"}</td>
        <td class="disc">${h.maturity || "—"}</td>
        <td class="qty">${h.duration != null ? h.duration.toFixed(2) : "—"}</td>
        <td class="qty">${h.ytm_pct != null ? h.ytm_pct.toFixed(2) + "%" : "—"}</td>
      </tr>` : `<tr>
        <td class="ticker">${h.ticker}</td>
        <td class="issuer">${h.name}</td>
        <td class="asset-class">${h.asset_class}</td>
        <td class="value">${fmtMv(h.market_value)}</td>
        <td class="weight">${fmtWt(h.weight_pct, "weight-bar")}</td>
        <td class="qty">${h.quantity != null ? h.quantity.toLocaleString("en-US", { maximumFractionDigits: 5 }) : "—"}</td>
        <td class="disc">${h.currency}</td>
      </tr>`).join("");

      statusEl.style.display = "none";
    } catch (e) {
      statusEl.textContent = `Error: ${e.message}`;
    }
  }

  document.getElementById("etf-select").addEventListener("change", e => loadEtf(e.target.value));
  loadEtf("ibit");

  // Quarterly Changes
  let qtrLoaded = false;

  async function loadQuarterly() {
    if (qtrLoaded) return;
    const statusEl = document.getElementById("qtr-status");
    try {
      const res = await fetch("/data/quarterly_changes_0002012383.json");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      qtrLoaded = true;

      const quarters = data.quarters;
      const n = quarters.length;

      let hRow1 = `<tr><th colspan="3"></th>`;
      for (let i = 0; i < n; i++) {
        const sep = i === 0 ? "" : " sep";
        hRow1 += `<th colspan="2" class="qtr-group-label${sep}">${quarters[i]}</th>`;
        if (i < n - 1) hRow1 += `<th class="qtr-group-label sep">Δ→${quarters[i+1].slice(5,7)}/${quarters[i+1].slice(2,4)}</th><th class="qtr-group-label">Δ</th>`;
      }
      hRow1 += `</tr>`;

      let hRow2 = `<tr>
        <th class="col-issuer" style="text-align:left">#</th>
        <th class="col-issuer" style="text-align:left">Issuer</th>
        <th class="col-cusip">CUSIP</th>`;
      for (let i = 0; i < n; i++) {
        const sep = i === 0 ? "" : " sep";
        hRow2 += `<th class="${sep}">Shares</th><th>Value ($M)</th>`;
        if (i < n - 1) hRow2 += `<th class="sep">Δ Shares</th><th>Δ Value</th>`;
      }
      hRow2 += `</tr>`;

      document.getElementById("qtr-thead").innerHTML = hRow1 + hRow2;

      const rows = data.holdings.map((h, idx) => {
        let row = `<tr>
          <td class="rank">${idx + 1}</td>
          <td class="col-issuer" title="${h.issuer}">${h.issuer}</td>
          <td class="col-cusip">${h.cusip}</td>`;

        for (let i = 0; i < n; i++) {
          const q = h.quarters[i];
          const shares = q.shares != null ? q.shares.toLocaleString() : "—";
          const valM   = q.value_usd != null
            ? (q.value_usd / 1_000_000).toLocaleString("en-US", { maximumFractionDigits: 0 })
            : "—";
          const sep = i === 0 ? "" : " sep";
          row += `<td class="num${sep}">${shares}</td><td class="num">${valM}</td>`;

          if (i < n - 1) {
            const delta = h.deltas[i];
            const sc = delta.shares > 0 ? "delta-pos" : delta.shares < 0 ? "delta-neg" : "delta-zero";
            const vc = delta.value_usd > 0 ? "delta-pos" : delta.value_usd < 0 ? "delta-neg" : "delta-zero";
            const sfmt = delta.shares === 0 ? "—" : (delta.shares > 0 ? "+" : "") + delta.shares.toLocaleString();
            const vfmt = delta.value_usd === 0 ? "—"
              : (delta.value_usd > 0 ? "+" : "") + (delta.value_usd / 1_000_000).toLocaleString("en-US", { maximumFractionDigits: 0 });
            row += `<td class="${sc} sep">${sfmt}</td><td class="${vc}">${vfmt}</td>`;
          }
        }

        row += `</tr>`;
        return row;
      }).join("");

      document.getElementById("qtr-tbody").innerHTML = rows;
      statusEl.style.display = "none";
    } catch (e) {
      statusEl.textContent = `Error: ${e.message}`;
    }
  }
</script>
</body>
