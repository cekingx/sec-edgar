<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holdings Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; color: #f1f5f9; }
    header .meta { font-size: 0.8rem; color: #64748b; margin-left: auto; }

    .tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.75rem 1.25rem;
      margin-bottom: -1px;
      transition: color 0.15s;
    }

    .tab-btn:hover { color: #e2e8f0; }
    .tab-btn.active { color: #818cf8; border-bottom-color: #818cf8; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .stats {
      display: flex;
      gap: 1rem;
      padding: 1.25rem 2rem;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 0.875rem 1.25rem;
      min-width: 160px;
    }

    .stat-card .label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; margin-top: 2px; }

    .controls {
      display: flex;
      gap: 0.75rem;
      padding: 0 2rem 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="search"] {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 0.45rem 0.75rem;
      font-size: 0.875rem;
      width: 260px;
      outline: none;
    }

    input[type="search"]:focus { border-color: #6366f1; }

    select {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 0.45rem 0.75rem;
      font-size: 0.875rem;
      outline: none;
      cursor: pointer;
    }

    select:focus { border-color: #6366f1; }

    .table-wrap {
      padding: 0 2rem 2rem;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      background: #1a1d27;
      color: #94a3b8;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.65rem 0.875rem;
      text-align: left;
      border-bottom: 1px solid #2d3148;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover { color: #e2e8f0; }
    thead th.sorted { color: #818cf8; }

    thead th .arrow { margin-left: 4px; opacity: 0.5; }
    thead th.sorted .arrow { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid #1e2133;
      transition: background 0.1s;
    }

    tbody tr:hover { background: #1e2133; }

    td {
      padding: 0.6rem 0.875rem;
      white-space: nowrap;
    }

    td.rank { color: #475569; font-size: 0.78rem; width: 48px; }
    td.issuer { max-width: 260px; overflow: hidden; text-overflow: ellipsis; color: #f1f5f9; font-weight: 500; }
    td.cusip { color: #64748b; font-family: monospace; font-size: 0.8rem; }
    td.class { color: #94a3b8; }
    td.value { text-align: right; font-variant-numeric: tabular-nums; }
    td.shares { text-align: right; font-variant-numeric: tabular-nums; color: #94a3b8; }
    td.disc { color: #64748b; font-size: 0.78rem; }

    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .badge-call { background: #14532d; color: #4ade80; }
    .badge-put  { background: #450a0a; color: #f87171; }

    .pager {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 2rem 1.5rem;
      font-size: 0.8rem;
      color: #64748b;
    }

    .pager button {
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 5px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .pager button:disabled { opacity: 0.35; cursor: default; }
    .pager button:not(:disabled):hover { border-color: #6366f1; }

    #status { padding: 4rem 2rem; text-align: center; color: #475569; }

    .bar-wrap { display: flex; align-items: center; gap: 6px; }
    .bar {
      height: 6px;
      border-radius: 3px;
      background: #4f46e5;
      min-width: 2px;
    }

    /* iShares ETF panel */
    .etf-hero {
      display: flex;
      gap: 1rem;
      padding: 1.25rem 2rem;
      flex-wrap: wrap;
    }

    .etf-stat {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 0.875rem 1.25rem;
      min-width: 180px;
    }

    .etf-stat .label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .etf-stat .value { font-size: 1.35rem; font-weight: 700; color: #f1f5f9; margin-top: 2px; }
    .etf-stat .sub { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

    .weight-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .weight-bar {
      height: 8px;
      border-radius: 4px;
      background: #f59e0b;
      min-width: 2px;
    }

    td.weight { text-align: right; font-variant-numeric: tabular-nums; }
    td.qty { text-align: right; font-variant-numeric: tabular-nums; color: #94a3b8; }
    td.ticker { font-family: monospace; font-weight: 700; color: #fbbf24; }
    td.asset-class { color: #94a3b8; font-size: 0.82rem; }
  </style>
</head>
<body>

<header>
  <h1 id="header-title">Holdings Viewer</h1>
  <div class="meta" id="header-meta"></div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="tab-13f">13F Holdings</button>
  <button class="tab-btn" data-tab="tab-etf">iShares ETF</button>
</nav>

<!-- 13F Holdings Panel -->
<div id="tab-13f" class="tab-panel active">
  <div class="stats">
    <div class="stat-card"><div class="label">Period</div><div class="value" id="stat-date">—</div></div>
    <div class="stat-card"><div class="label">Total Positions</div><div class="value" id="stat-positions">—</div></div>
    <div class="stat-card"><div class="label">Total Value</div><div class="value" id="stat-value">—</div></div>
  </div>

  <div class="controls">
    <input type="search" id="search" placeholder="Search issuer or CUSIP…" />
    <select id="disc-filter">
      <option value="">All discretion</option>
      <option value="SOLE">SOLE</option>
      <option value="SHARED">SHARED</option>
      <option value="DFND">DEFINED</option>
    </select>
    <select id="page-size">
      <option value="50">50 / page</option>
      <option value="100">100 / page</option>
      <option value="250">250 / page</option>
    </select>
  </div>

  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th data-col="rank">#</th>
          <th data-col="issuer">Issuer</th>
          <th data-col="cusip">CUSIP</th>
          <th data-col="class">Class</th>
          <th data-col="value_1000s" class="sorted">Value ($M) <span class="arrow">▼</span></th>
          <th data-col="shares">Shares <span class="arrow"></span></th>
          <th data-col="investDisc">Discretion <span class="arrow"></span></th>
          <th data-col="putCall">Put/Call <span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pager">
    <button id="btn-prev">← Prev</button>
    <span id="pager-info"></span>
    <button id="btn-next">Next →</button>
  </div>

  <div id="status">Loading holdings…</div>
</div>

<!-- iShares ETF Panel -->
<div id="tab-etf" class="tab-panel">
  <div class="controls" style="padding-top:1.25rem">
    <select id="etf-select">
      <option value="ibit">IBIT — iShares Bitcoin Trust ETF</option>
      <option value="etha">ETHA — iShares Ethereum Trust ETF</option>
    </select>
  </div>

  <div class="etf-hero">
    <div class="etf-stat">
      <div class="label">Fund</div>
      <div class="value" id="etf-name" style="font-size:1rem">—</div>
    </div>
    <div class="etf-stat">
      <div class="label">As of</div>
      <div class="value" id="etf-date">—</div>
      <div class="sub" id="etf-inception"></div>
    </div>
    <div class="etf-stat">
      <div class="label">AUM</div>
      <div class="value" id="etf-aum">—</div>
    </div>
    <div class="etf-stat">
      <div class="label">Shares Outstanding</div>
      <div class="value" id="etf-shares">—</div>
    </div>
    <div class="etf-stat">
      <div class="label">Asset Held</div>
      <div class="value" id="etf-asset">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ticker</th>
          <th>Name</th>
          <th>Asset Class</th>
          <th style="text-align:right">Market Value</th>
          <th style="text-align:right">Weight %</th>
          <th style="text-align:right">Quantity</th>
          <th>Currency</th>
        </tr>
      </thead>
      <tbody id="etf-tbody"></tbody>
    </table>
  </div>

  <div id="etf-status">Loading ETF data…</div>
</div>

<script>
  let allData = [];
  let filtered = [];
  let sortCol = "value_1000s";
  let sortDir = -1; // -1 = desc
  let page = 0;
  let pageSize = 50;
  let maxVal = 1;

  async function load() {
    try {
      const res = await fetch("/data/holdings_0002012383_2025-12-31.json");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();

      document.getElementById("header-title").textContent = `${json.fund} — 13F Holdings`;
      document.getElementById("header-meta").textContent = `Fetched ${new Date(json.fetched).toLocaleString()}`;
      document.getElementById("stat-date").textContent = json.date;
      document.getElementById("stat-positions").textContent = json.total_positions.toLocaleString();

      const totalT = json.total_value_usd / 1e12;
      document.getElementById("stat-value").textContent =
        totalT >= 1 ? `$${totalT.toFixed(2)}T` : `$${(json.total_value_usd / 1e9).toFixed(1)}B`;

      const byKey = {};
      json.holdings.forEach(h => {
        const key = h.cusip || h.issuer;
        if (!byKey[key]) byKey[key] = { ...h, value_1000s: 0, shares: 0 };
        byKey[key].value_1000s += h.value_1000s || 0;
        byKey[key].shares += h.shares || 0;
      });
      allData = Object.values(byKey)
        .sort((a, b) => (b.value_1000s || 0) - (a.value_1000s || 0))
        .slice(0, 20)
        .map((h, i) => ({ ...h, _origRank: i + 1 }));
      maxVal = Math.max(...allData.map(h => h.value_1000s));

      document.getElementById("status").style.display = "none";
      applyFilters();
    } catch (e) {
      document.getElementById("status").textContent = `Error: ${e.message}`;
    }
  }

  function applyFilters() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const disc = document.getElementById("disc-filter").value;

    filtered = allData.filter(h => {
      if (q && !h.issuer.toLowerCase().includes(q) && !h.cusip.toLowerCase().includes(q)) return false;
      if (disc && h.investDisc !== disc) return false;
      return true;
    });

    filtered.sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (typeof av === "string") av = av.toLowerCase(), bv = bv.toLowerCase();
      return av < bv ? sortDir : av > bv ? -sortDir : 0;
    });

    page = 0;
    render();
  }

  function render() {
    pageSize = parseInt(document.getElementById("page-size").value);
    const start = page * pageSize;
    const slice = filtered.slice(start, start + pageSize);
    const tbody = document.getElementById("tbody");

    tbody.innerHTML = slice.map((h, i) => {
      const rank = start + i + 1;
      const valM = (h.value_1000s / 1000).toLocaleString("en-US", { maximumFractionDigits: 0 });
      const barPct = Math.round((h.value_1000s / maxVal) * 120);
      const shares = h.shares.toLocaleString();
      const putCallBadge = h.putCall === "Call"
        ? `<span class="badge badge-call">CALL</span>`
        : h.putCall === "Put"
        ? `<span class="badge badge-put">PUT</span>`
        : `<span style="color:#475569">—</span>`;

      return `<tr>
        <td class="rank">${rank}</td>
        <td class="issuer" title="${h.issuer}">${h.issuer}</td>
        <td class="cusip">${h.cusip}</td>
        <td class="class">${h.class}</td>
        <td class="value">
          <div class="bar-wrap">
            <div class="bar" style="width:${barPct}px"></div>
            <span>${valM}</span>
          </div>
        </td>
        <td class="shares">${shares}</td>
        <td class="disc">${h.investDisc}</td>
        <td>${putCallBadge}</td>
      </tr>`;
    }).join("");

    const total = filtered.length;
    const end = Math.min(start + pageSize, total);
    document.getElementById("pager-info").textContent =
      total === 0 ? "No results" : `${start + 1}–${end} of ${total.toLocaleString()}`;
    document.getElementById("btn-prev").disabled = page === 0;
    document.getElementById("btn-next").disabled = end >= total;
  }

  // Sorting
  document.querySelectorAll("thead th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (col === "rank") return;
      if (sortCol === col) {
        sortDir *= -1;
      } else {
        sortCol = col;
        sortDir = col === "issuer" || col === "cusip" || col === "class" || col === "investDisc" || col === "putCall" ? 1 : -1;
      }
      document.querySelectorAll("thead th").forEach(t => {
        t.classList.remove("sorted");
        const a = t.querySelector(".arrow");
        if (a) a.textContent = "";
      });
      th.classList.add("sorted");
      const arrow = th.querySelector(".arrow") || (() => { const s = document.createElement("span"); s.className = "arrow"; th.appendChild(s); return s; })();
      arrow.textContent = sortDir === -1 ? " ▼" : " ▲";
      applyFilters();
    });
  });

  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("disc-filter").addEventListener("change", applyFilters);
  document.getElementById("page-size").addEventListener("change", () => { page = 0; render(); });
  document.getElementById("btn-prev").addEventListener("click", () => { page--; render(); });
  document.getElementById("btn-next").addEventListener("click", () => { page++; render(); });

  load();

  // Tab switching
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.tab).classList.add("active");
    });
  });

  // iShares ETF
  const ETF_FILES = { ibit: "/data/ibit_holdings.json", etha: "/data/etha_holdings.json" };

  async function loadEtf(key) {
    const statusEl = document.getElementById("etf-status");
    statusEl.style.display = "";
    statusEl.textContent = "Loading…";
    try {
      const res = await fetch(ETF_FILES[key]);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();

      document.getElementById("etf-name").textContent = d.fund;
      document.getElementById("etf-date").textContent = d.date;
      document.getElementById("etf-inception").textContent = `Inception: ${d.inception_date}`;

      const aum = d.total_market_value;
      document.getElementById("etf-aum").textContent =
        aum >= 1e9 ? `$${(aum / 1e9).toFixed(2)}B` : `$${(aum / 1e6).toFixed(2)}M`;

      document.getElementById("etf-shares").textContent =
        (d.shares_outstanding / 1e6).toFixed(1) + "M";

      const primary = d.holdings.find(h => h.asset_class === "Alternative") || d.holdings[0];
      document.getElementById("etf-asset").textContent = primary
        ? `${primary.quantity.toLocaleString("en-US", { maximumFractionDigits: 3 })} ${primary.currency}`
        : "—";

      const tbody = document.getElementById("etf-tbody");
      tbody.innerHTML = d.holdings.map(h => {
        const mv = h.market_value != null
          ? "$" + h.market_value.toLocaleString("en-US", { maximumFractionDigits: 2 })
          : "—";
        const wt = h.weight_pct != null ? h.weight_pct.toFixed(2) + "%" : "—";
        const barW = h.weight_pct != null ? Math.round(h.weight_pct * 1.2) : 0;
        const qty = h.quantity != null
          ? h.quantity.toLocaleString("en-US", { maximumFractionDigits: 5 })
          : "—";

        return `<tr>
          <td class="ticker">${h.ticker}</td>
          <td class="issuer">${h.name}</td>
          <td class="asset-class">${h.asset_class}</td>
          <td class="value">${mv}</td>
          <td class="weight">
            <div class="weight-bar-wrap">
              <div class="weight-bar" style="width:${barW}px"></div>
              <span>${wt}</span>
            </div>
          </td>
          <td class="qty">${qty}</td>
          <td class="disc">${h.currency}</td>
        </tr>`;
      }).join("");

      statusEl.style.display = "none";
    } catch (e) {
      statusEl.textContent = `Error: ${e.message}`;
    }
  }

  document.getElementById("etf-select").addEventListener("change", e => loadEtf(e.target.value));
  loadEtf("ibit");
</script>
</body>
</html>
